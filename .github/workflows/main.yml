name: Fetch Telegram Channel Data

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel username or invite link (e.g. @durov or https://t.me/+invite)'
        required: true
        type: string
      limit:
        description: 'How many latest messages to fetch (1-50). Default: 5'
        required: false
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install telethon

      - name: Run Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CHANNEL: ${{ github.event.inputs.channel }}
          LIMIT: ${{ github.event.inputs.limit }}
        run: python fetch_message.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Update channel data (latest ${{ github.event.inputs.limit || '5' }} posts)" || true
          git push
